<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, 
          initial-scale=1.0">
    <title>GroWell</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #F0FDFA;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 48px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 24px 
                rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            color: #0D9488;
            font-size: 36px;
            margin-bottom: 8px;
        }
        p {
            color: #4B5563;
            font-size: 18px;
        }
        .badge {
            background: #CCFBF1;
            color: #0D7A6F;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="badge">
            Coming Soon
        </div>
        <h1>GroWell</h1>
        <p>Early Detection. 
           Healthier Futures.</p>
        <p style="margin-top:16px; 
                  font-size:14px; 
                  color:#9CA3AF;">
            Pediatric nutrition 
            risk detection platform
        </p>
    </div>
</body>
</html>
