<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroWell — Transforming Pediatric Health By Making Preventative Care Scalable</title>
    <meta name="description" content="GroWell transforms pediatric health by making preventative care scalable. AI-powered nutrition risk detection and care coordination platform.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===========================
           BRAND TOKENS
        =========================== */
        :root {
            --dark:         #3D3D3D;
            --dark-deep:    #2C2C2C;
            --dark-card:    #474747;
            --dark-border:  #555555;
            --bar-red:      #E05A4E;
            --bar-orange:   #F0A500;
            --bar-green:    #4CAF50;
            --white:        #FFFFFF;
            --white-80:     rgba(255,255,255,0.80);
            --white-60:     rgba(255,255,255,0.60);
            --white-40:     rgba(255,255,255,0.40);
            --white-20:     rgba(255,255,255,0.20);
            --white-10:     rgba(255,255,255,0.10);
            --white-05:     rgba(255,255,255,0.05);
            --teal:         #0D9488;
            --teal-light:   #CCFBF1;
            --teal-dark:    #0D7A6F;
            --font:         'Inter', sans-serif;
            --shadow-sm:    0 2px 8px rgba(0,0,0,0.3);
            --shadow-md:    0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg:    0 8px 40px rgba(0,0,0,0.5);
            --radius-sm:    8px;
            --radius-md:    12px;
            --radius-lg:    20px;
            --radius-xl:    28px;
        }

        /* ===========================
           RESET
        =========================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--dark);
            color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }

        img { max-width: 100%; display: block; }

        /* ===========================
           LOGO
        =========================== */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 26px;
        }

        .logo-bar {
            width: 7px;
            border-radius: 2px 2px 0 0;
        }

        .logo-bar.b1 {
            height: 40%;
            background: var(--bar-red);
        }

        .logo-bar.b2 {
            height: 68%;
            background: var(--bar-orange);
        }

        .logo-bar.b3 {
            height: 100%;
            background: var(--bar-green);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.3px;
        }

        /* ===========================
           NAVIGATION
        =========================== */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: rgba(44,44,44,0.96);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--white-10);
            transition: box-shadow 0.3s;
        }

        .nav.scrolled {
            box-shadow: var(--shadow-md);
        }

        .nav-inner {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--white-60);
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--white); }

        .nav-cta {
            background: var(--white) !important;
            color: var(--dark-deep) !important;
            padding: 10px 22px !important;
            border-radius: var(--radius-sm) !important;
            font-weight: 700 !important;
            transition: all 0.2s !important;
        }

        .nav-cta:hover {
            background: var(--white-80) !important;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
        }

        /* ===========================
           CONTAINER + SECTION
        =========================== */
        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section { padding: 96px 0; }
        .section-dark { background: var(--dark); }
        .section-deeper { background: var(--dark-deep); }

        .tag {
            display: inline-block;
            background: var(--white-10);
            color: var(--white-80);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 16px;
            border: 1px solid var(--white-20);
        }

        .section-headline {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 800;
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .section-headline span { color: var(--bar-green); }

        .section-sub {
            font-size: 18px;
            color: var(--white-60);
            max-width: 600px;
            line-height: 1.7;
        }

        .section-header { margin-bottom: 64px; }
        .section-header.centered { text-align: center; }
        .section-header.centered .section-sub { margin: 0 auto; }

        /* ===========================
           HERO
        =========================== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 140px 0 100px;
            background: var(--dark);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -300px; right: -300px;
            width: 700px; height: 700px;
            background: radial-gradient(circle,
                rgba(76,175,80,0.07) 0%,
                transparent 70%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -200px; left: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle,
                rgba(13,148,136,0.05) 0%,
                transparent 70%);
            pointer-events: none;
        }

        .hero-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 900px) {
            .hero-inner {
                grid-template-columns: 1fr;
                gap: 48px;
            }
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white-10);
            border: 1px solid var(--white-20);
            color: var(--white-80);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 100px;
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            background: var(--bar-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
        }

        .hero-headline {
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 800;
            color: var(--white);
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
        }

        .hero-headline .accent {
            background: linear-gradient(
                135deg, var(--bar-green), var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-tagline {
            font-size: 16px;
            font-weight: 700;
            color: var(--white-80);
            margin-bottom: 16px;
            letter-spacing: 0.01em;
        }

        .hero-sub {
            font-size: 17px;
            color: var(--white-60);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn-primary {
            background: var(--white);
            color: var(--dark-deep);
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--white-80);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            border: 1px solid var(--white-20);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--white-10);
            border-color: var(--white-40);
            transform: translateY(-2px);
        }

        .hero-trust {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hero-trust-text {
            font-size: 12px;
            color: var(--white-40);
            font-weight: 500;
        }

        .trust-badge {
            background: var(--white-05);
            border: 1px solid var(--white-20);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--white-60);
        }

        /* Hero Card */
        .hero-visual { position: relative; }

        .hero-card {
            background: var(--dark-card);
            border-radius: var(--radius-xl);
            padding: 32px;
            border: 1px solid var(--white-10);
            box-shadow: var(--shadow-lg);
        }

        .hero-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--white-10);
        }

        .hero-card-icon {
            width: 44px;
            height: 44px;
            background: var(--white-10);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .hero-card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
        }

        .hero-card-sub {
            font-size: 12px;
            color: var(--white-60);
        }

        .hero-stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .hero-stat-box {
            background: var(--white-05);
            border: 1px solid var(--white-10);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .hero-stat-number {
            font-size: 26px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .hero-stat-number.green { color: var(--bar-green); }
        .hero-stat-number.orange { color: var(--bar-orange); }
        .hero-stat-number.red { color: var(--bar-red); }
        .hero-stat-number.white { color: var(--white); }

        .hero-stat-label {
            font-size: 11px;
            color: var(--white-60);
            font-weight: 500;
            line-height: 1.4;
        }

        .progress-wrap { margin-top: 4px; }

        .progress-top {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: var(--white-60);
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 8px;
            background: var(--white-10);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg,
                var(--bar-green), var(--teal));
            border-radius: 100px;
            width: 70%;
        }

        /* ===========================
           PROBLEM
        =========================== */
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 24px;
        }

        @media (max-width: 768px) {
            .problem-grid { grid-template-columns: 1fr; }
        }

        .problem-card {
            background: var(--dark-card);
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            border: 1px solid var(--white-10);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .problem-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .problem-card.p-red::before { background: var(--bar-red); }
        .problem-card.p-orange::before { background: var(--bar-orange); }
        .problem-card.p-green::before { background: var(--bar-green); }

        .problem-card:hover {
            transform: translateY(-4px);
            border-color: var(--white-20);
            box-shadow: var(--shadow-lg);
        }

        .problem-card:hover::before { transform: scaleX(1); }

        .problem-number {
            font-size: 52px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }

        .problem-card.p-red .problem-number { color: var(--bar-red); }
        .problem-card.p-orange .problem-number { color: var(--bar-orange); }
        .problem-card.p-green .problem-number { color: var(--bar-green); }

        .problem-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
        }

        .problem-desc {
            font-size: 14px;
            color: var(--white-60);
            line-height: 1.6;
        }

        .problem-source {
            font-size: 11px;
            color: var(--white-40);
            margin-top: 16px;
            font-style: italic;
        }

        /* ===========================
           HOW IT WORKS
        =========================== */
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 24px;
        }

        @media (max-width: 900px) {
            .steps-grid { grid-template-columns: repeat(2,1fr); }
        }

        @media (max-width: 500px) {
            .steps-grid { grid-template-columns: 1fr; }
        }

        .step-card {
            background: var(--dark-card);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            text-align: center;
            border: 1px solid var(--white-10);
            transition: all 0.3s;
            position: relative;
        }

        .step-card:hover {
            transform: translateY(-4px);
            border-color: var(--white-20);
            box-shadow: var(--shadow-md);
        }

        .step-number {
            width: 52px;
            height: 52px;
            background: var(--white-10);
            border: 2px solid var(--white-20);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            margin: 0 auto 16px;
            transition: all 0.3s;
        }

        .step-card:hover .step-number {
            background: var(--bar-green);
            border-color: var(--bar-green);
        }

        .step-icon { font-size: 28px; margin-bottom: 12px; }

        .step-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
        }

        .step-desc {
            font-size: 14px;
            color: var(--white-60);
            line-height: 1.6;
        }

        /* ===========================
           VALUE PROPS
        =========================== */
        .value-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 24px;
        }

        @media (max-width: 768px) {
            .value-grid { grid-template-columns: 1fr; }
        }

        .value-card {
            background: var(--dark-card);
            border-radius: var(--radius-lg);
            padding: 36px 28px;
            border: 1px solid var(--white-10);
            transition: all 0.3s;
        }

        .value-card:hover {
            transform: translateY(-4px);
            border-color: var(--white-20);
            box-shadow: var(--shadow-lg);
        }

        .value-icon-wrap {
            width: 56px;
            height: 56px;
            background: var(--white-10);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .value-subtitle {
            font-size: 12px;
            font-weight: 600;
            color: var(--bar-green);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .value-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 12px;
        }

        .value-desc {
            font-size: 14px;
            color: var(--white-60);
            line-height: 1.7;
        }

        .value-features {
            list-style: none;
            margin-top: 16px;
        }

        .value-features li {
            font-size: 13px;
            color: var(--white-60);
            padding: 5px 0 5px 20px;
            position: relative;
        }

        .value-features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--bar-green);
            font-weight: 700;
        }

        /* ===========================
           VALIDATION
        =========================== */
        .validation-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .validation-inner {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }

        .val-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .val-stat {
            background: var(--dark-card);
            border-radius: var(--radius-md);
            padding: 28px 20px;
            border: 1px solid var(--white-10);
            text-align: center;
            transition: all 0.3s;
        }

        .val-stat:hover {
            border-color: var(--white-20);
            box-shadow: var(--shadow-md);
        }

        .val-stat.highlight {
            background: var(--bar-green);
            border-color: var(--bar-green);
        }

        .val-stat-number {
            font-size: 40px;
            font-weight: 800;
            color: var(--bar-green);
            line-height: 1;
            margin-bottom: 8px;
        }

        .val-stat.highlight .val-stat-number { color: var(--white); }

        .val-stat-label {
            font-size: 13px;
            color: var(--white-60);
            font-weight: 500;
            line-height: 1.4;
        }

        .val-stat.highlight .val-stat-label {
            color: rgba(255,255,255,0.85);
        }

        .validation-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white-10);
            border: 1px solid var(--white-20);
            color: var(--white-80);
            font-size: 13px;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }

        .validation-note {
            font-size: 13px;
            color: var(--white-40);
            font-style: italic;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--white-10);
        }

        /* ===========================
           AUDIENCE
        =========================== */
        .audience-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 24px;
        }

        @media (max-width: 768px) {
            .audience-grid { grid-template-columns: 1fr; }
        }

        .audience-card {
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            transition: all 0.3s;
        }

        .audience-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .audience-card.a1 {
            background: linear-gradient(
                135deg, #2a5a2a, #3d7a3d);
            border: 1px solid rgba(76,175,80,0.3);
        }

        .audience-card.a2 {
            background: var(--dark-card);
            border: 1px solid var(--white-10);
        }

        .audience-card.a3 {
            background: linear-gradient(
                135deg, var(--dark-deep), #1a1a2e);
            border: 1px solid var(--white-10);
        }

        .audience-icon { font-size: 36px; margin-bottom: 20px; }

        .audience-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 12px;
        }

        .audience-desc {
            font-size: 14px;
            color: var(--white-60);
            line-height: 1.7;
        }

        .audience-features {
            list-style: none;
            margin-top: 20px;
        }

        .audience-features li {
            font-size: 13px;
            color: var(--white-60);
            padding: 6px 0 6px 20px;
            position: relative;
        }

        .audience-features li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--bar-green);
            font-weight: 700;
        }

        /* ===========================
           TEAM
        =========================== */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 32px;
            max-width: 800px;
            margin: 0 auto 48px;
        }

        @media (max-width: 600px) {
            .team-grid { grid-template-columns: 1fr; }
        }

        .team-card {
            background: var(--dark-card);
            border-radius: var(--radius-lg);
            padding: 32px;
            border: 1px solid var(--white-10);
            display: flex;
            gap: 20px;
            align-items: flex-start;
            transition: all 0.3s;
        }

        .team-card:hover {
            transform: translateY(-4px);
            border-color: var(--white-20);
            box-shadow: var(--shadow-md);
        }

        .team-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--white-10);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--white);
            flex-shrink: 0;
            border: 2px solid var(--white-20);
            overflow: hidden;
        }
